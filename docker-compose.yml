version: "3.9"

services:
  validation:
    build: ./services/validation
    container_name: validation
    ports:
      - "8001:8001"

  rule-engine:
    build: ./services/rule_engine
    container_name: rule-engine
    ports:
      - "8002:8002"

  etl:
    build: ./services/etl
    container_name: etl
    ports:
      - "8003:8003"

  automation:
    build: ./services/automation
    container_name: automation
    ports:
      - "8004:8004"

  gateway:
    build: ./services/gateway
    container_name: gateway
    ports:
      - "8000:8000"
    depends_on:
      - validation
      - rule-engine
      - etl
      - automation

  dashboard:
    build: ./services/dashboard
    container_name: dashboard
    ports:
      - "8005:8005"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
