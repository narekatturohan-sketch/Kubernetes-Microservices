version: "3.9"

services:
  validation:
    context: ./services
    dockerfile: Dockerfile.validation
    ports:
      - "8001:8001"

  rule-engine:
    context: ./services
    dockerfile: Dockerfile.rule_engine
    container_name: rule-engine
    ports:
      - "8002:8002"

  etl:
    context: ./services
    dockerfile: Dockerfile.etl
    container_name: etl
    ports:
      - "8003:8003"

  automation:
    context: ./services
    dockerfile: Dockerfile.automation
    container_name: automation
    ports:
      - "8004:8004"

  gateway:
    context: ./services
    dockerfile: Dockerfile.gateway
    container_name: gateway
    ports:
      - "8000:8000"
    depends_on:
      - validation
      - rule-engine
      - etl
      - automation

  dashboard:
    context: ./services/dashboard
    dockerfile: Dockerfile
    container_name: dashboard
    ports:
      - "8005:8005"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
